name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.7.1-test)'
        required: false
        default: 'v0.0.0-test'

# Opt into Node.js 24 for all actions until upstream releases Node.js 24-native
# versions of checkout/setup-python/upload-artifact/download-artifact/cache.
# Remove this once all actions are updated (deadline: 2026-06-02).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify-master-ancestry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is descended from master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor origin/master "$GITHUB_SHA"; then
            echo "ERROR: Tag $GITHUB_REF_NAME is not descended from master. Only tag from master."
            exit 1
          fi
          echo "OK: $GITHUB_REF_NAME is descended from master"

  # ---------------------------------------------------------------------------
  # Windows — Embedded Python + source files packaged by Inno Setup
  #
  # Layout inside the installer:
  #   {app}\JobDocs.exe        tiny C launcher (no console)
  #   {app}\app\               Python source tree
  #   {app}\runtime\           Python 3.12 embeddable + pre-installed deps
  #   {app}\plugins\           empty; user populates via Install Plugin
  # ---------------------------------------------------------------------------
  build-windows:
    needs: verify-master-ancestry
    runs-on: windows-latest
    permissions:
      contents: read

    env:
      PY_VER: "3.12.9"
      # SHA256 of python-3.12.9-embed-amd64.zip (verified via python.org sigstore)
      # Update this value whenever PY_VER is bumped.
      PY_EMBED_SHA256: "615861fb801e8b04c847598db4e1e46e4b046295017caa37cb5486dde72b5865"
      # Use the workflow_dispatch version input for manual test builds; fall back to the tag name.
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python for bootstrapping
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download Python embeddable
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/$env:PY_VER/python-$env:PY_VER-embed-amd64.zip"
          Invoke-WebRequest $url -OutFile python-embed.zip
          $actual = (Get-FileHash python-embed.zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $env:PY_EMBED_SHA256) {
            Write-Error "SHA256 mismatch for python-embed.zip`nExpected: $env:PY_EMBED_SHA256`nActual:   $actual"
            exit 1
          }
          Expand-Archive python-embed.zip -DestinationPath runtime

      - name: Enable site-packages in embedded Python
        shell: pwsh
        run: |
          $pth = Get-Item runtime\python3*._pth
          $content = (Get-Content $pth) -replace '#import site', 'import site'
          # ../app makes core/, modules/, shared/ importable from the staged source tree.
          $content += "`n../app"
          $content | Set-Content $pth
          New-Item -ItemType Directory -Path runtime\Lib\site-packages -Force | Out-Null

      - name: Bootstrap pip into embedded Python
        shell: pwsh
        run: |
          # Use the setup-python system pip (pinned version above) rather than
          # downloading get-pip.py from the network, avoiding an unverified fetch.
          # Pin pip version for reproducible builds — bump PIP_VER when upgrading.
          python -m pip install --target runtime\Lib\site-packages --no-deps "pip==24.3.1"
          runtime\python.exe -m pip --version

      - name: Install app dependencies into embedded Python
        run: runtime\python.exe -m pip install -r requirements.txt --no-warn-script-location
        shell: pwsh

      - name: Stage app source tree
        shell: pwsh
        run: |
          $src_items = @('main.py','README.md','core','modules','shared',
                         'JobDocs.iconset','sample_files','requirements.txt')
          New-Item -ItemType Directory -Path app -Force | Out-Null
          foreach ($item in $src_items) {
            if (Test-Path $item) {
              Copy-Item $item app\ -Recurse -Force
            }
          }

      - name: Compile launcher (MinGW)
        shell: bash
        run: |
          VER="${{ env.RELEASE_VERSION }}"
          VER="${VER#v}"
          VER="${VER%%-*}"   # strip pre-release suffix (e.g. -test, -rc1) — windres needs integers
          IFS='.' read -r MAJOR MINOR PATCH rest <<< "$VER"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          windres launcher/launcher.rc -O coff -o launcher_res.o \
            -D VERSION_MAJOR="$MAJOR" -D VERSION_MINOR="$MINOR" \
            -D VERSION_PATCH="$PATCH" -D VERSION_BUILD=0
          gcc -mwindows -O2 -o JobDocs.exe launcher/launcher.c launcher_res.o

      - name: Verify build
        shell: pwsh
        run: |
          if (!(Test-Path "JobDocs.exe")) {
            Write-Error "JobDocs.exe not found — launcher build failed"; exit 1
          }
          if (!(Test-Path "runtime\python.exe")) {
            Write-Error "runtime\python.exe not found — embed setup failed"; exit 1
          }
          if (!(Test-Path "app\main.py")) {
            Write-Error "app\main.py not found — staging failed"; exit 1
          }
          Write-Output "Launcher: $(Get-Item JobDocs.exe | Select-Object -ExpandProperty Length) bytes"
          Write-Output "Runtime Python: $(runtime\python.exe --version)"
          # Verify app imports resolve correctly through the _pth ../app entry.
          runtime\python.exe -c "from core.module_loader import ModuleLoader; print('imports OK')"
          if ($LASTEXITCODE -ne 0) { Write-Error "App imports failed — check _pth ../app entry"; exit 1 }

      # -----------------------------------------------------------------------
      # SignPath code signing — uncomment once SignPath Foundation is approved
      # Apply at: https://signpath.io/product/open-source
      # -----------------------------------------------------------------------
      # - name: Sign launcher
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: jobdocs
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: single-exe
      #     github-artifact-name: JobDocs-unsigned
      #     output-artifact-name: JobDocs-signed

      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          if (!(Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup --confirm --no-progress
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $env:RELEASE_VERSION = "${{ env.RELEASE_VERSION }}"
          iscc build_scripts\JobDocs.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobDocs-windows
          path: installer_out/JobDocs-${{ env.RELEASE_VERSION }}-windows-setup.exe

  # ---------------------------------------------------------------------------
  # Linux — Python source packaged as a Flatpak bundle
  # ---------------------------------------------------------------------------
  build-flatpak:
    needs: verify-master-ancestry
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flatpak tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-freedesktop-24.08-${{ runner.arch }}
          restore-keys: |
            flatpak-runtime-freedesktop-24.08-

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Stage source files and download wheels
        run: |
          mkdir -p linux/flatpak/src
          for item in main.py core modules shared sample_files requirements.txt; do
            [ -e "$item" ] && cp -r "$item" linux/flatpak/src/
          done
          pip download --only-binary :all: -d linux/flatpak/src/wheels/ -r requirements.txt
          cp JobDocs.iconset/icon_256x256.png linux/flatpak/icon_256x256.png

      - name: Inject version into metainfo
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          DATE="$(date -u +%Y-%m-%d)"
          sed -i "s/@VERSION@/${VERSION}/g; s/@DATE@/${DATE}/g" \
            linux/flatpak/io.github.i_machine_things.JobDocs.metainfo.xml

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --repo=flatpak-repo \
            --force-clean \
            flatpak-build \
            linux/flatpak/io.github.i_machine_things.JobDocs.yml
          flatpak build-bundle \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            flatpak-repo \
            JobDocs-linux.flatpak \
            io.github.i_machine_things.JobDocs

      - name: Verify Flatpak bundle
        run: |
          test -f JobDocs-linux.flatpak || { echo "JobDocs-linux.flatpak not found — build failed"; exit 1; }
          echo "Flatpak OK: $(du -h JobDocs-linux.flatpak | cut -f1)"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobDocs-linux
          path: JobDocs-linux.flatpak

      - name: Upload Flatpak repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobDocs-flatpak-repo
          path: flatpak-repo/

  # ---------------------------------------------------------------------------
  # Flatpak repo — publish OSTree repo to gh-pages so Discover can update
  # ---------------------------------------------------------------------------
  publish-flatpak-repo:
    needs: build-flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak

      - name: Download Flatpak repo artifact
        uses: actions/download-artifact@v4
        with:
          name: JobDocs-flatpak-repo
          path: flatpak-repo

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | base64 -d | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-keys --with-colons noreply@github.com | awk -F: '/^fpr/{print $10; exit}')
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Sign and update repo summary
        run: |
          mkdir -p flatpak-repo/refs/remotes
          flatpak build-sign flatpak-repo --gpg-sign="$GPG_KEY_ID"
          flatpak build-update-repo --gpg-sign="$GPG_KEY_ID" flatpak-repo

      - name: Publish to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/gh-pages/repo
          cp -r flatpak-repo/. /tmp/gh-pages/repo/
          cp linux/flatpak/io.github.i_machine_things.JobDocs.flatpakrepo /tmp/gh-pages/jobdocs.flatpakrepo
          touch /tmp/gh-pages/.nojekyll

          VERSION="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RELEASES_URL="https://github.com/${REPO}/releases"

          cat > /tmp/gh-pages/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>JobDocs Flatpak Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; color: #222; }
              h1 { font-size: 1.8rem; }
              pre { background: #f4f4f4; padding: 12px 16px; border-radius: 6px; overflow-x: auto; }
              a { color: #0969da; }
              .badge { display: inline-block; background: #0969da; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 0.85rem; margin-left: 8px; }
            </style>
          </head>
          <body>
            <h1>JobDocs <span class="badge">${VERSION}</span></h1>
            <p>Job tracking and documentation for machine shops — Linux Flatpak repository.</p>

            <h2>Add this repository to Discover</h2>
            <p>Download and open the <a href="https://i-machine-things-org.github.io/JobDocs/jobdocs.flatpakrepo">.flatpakrepo file</a> — KDE Discover will prompt you to add it automatically.</p>
            <p>Or from the terminal:</p>
            <pre>flatpak remote-add --user --from jobdocs https://i-machine-things-org.github.io/JobDocs/jobdocs.flatpakrepo</pre>
            <p>Then install:</p>
            <pre>flatpak install jobdocs io.github.i_machine_things.JobDocs</pre>

            <h2>Releases</h2>
            <p>All releases including Windows installer and Linux Flatpak bundle:</p>
            <p><a href="${RELEASES_URL}">${RELEASES_URL}</a></p>

            <h2>Source</h2>
            <p><a href="https://github.com/${REPO}">https://github.com/${REPO}</a></p>
          </body>
          </html>
          EOF

          cd /tmp/gh-pages
          git init
          git checkout --orphan gh-pages
          git add -A
          git commit -m "chore: publish Flatpak repo ${{ github.ref_name }}"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages

  # ---------------------------------------------------------------------------
  # Release — combine both platform artifacts into a single GitHub Release
  # ---------------------------------------------------------------------------
  create-release:
    needs: [build-windows, build-flatpak]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: JobDocs-windows
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: JobDocs-linux
          path: release-assets

      - name: Stage flatpakrepo file
        run: cp linux/flatpak/io.github.i_machine_things.JobDocs.flatpakrepo release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JobDocs ${{ github.ref_name }}
          files: |
            release-assets/JobDocs-${{ github.ref_name }}-windows-setup.exe
            release-assets/JobDocs-linux.flatpak
            release-assets/io.github.i_machine_things.JobDocs.flatpakrepo
          generate_release_notes: true
          fail_on_unmatched_files: true
